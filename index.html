<script src="https://telegram.org/js/telegram-web-app.js"></script>

<h2 id="status">Scanning...</h2>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 👉 CHANGE HERE (BOT LINK)
function goBack(){
  window.location.href = "https://t.me/YOUR_BOT_USERNAME";
}

// 👉 fingerprint
async function getFingerprint() {
  const data = navigator.userAgent + screen.width + screen.height;
  return btoa(data);
}

// 👉 GET URL PARAM
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

async function verify() {
  const fp = await getFingerprint();

  const user = tg.initDataUnsafe.user;
  const ref = getParam("ref");

  const res = await fetch("/verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      fingerprint: fp,
      user_id: user.id,
      ref: ref
    })
  });

  const result = await res.json();

  if (result.status === "ok") {
    document.getElementById("status").innerHTML = "✅ Verified";
    tg.sendData("verified");

  } else if (result.status === "blocked") {
    document.getElementById("status").innerHTML = "🚫 Already Used Device";

  } else {
    document.getElementById("status").innerHTML = "❌ Failed";
  }
}

// auto run
setTimeout(verify, 2000);
</script>
