<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:100px;
}

.box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:15px;
    display:inline-block;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Device Verification</h2>
    <p id="status">Checking...</p>
    <button onclick="verify()">Verify Now</button>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get("uid");

function verify(){
    document.getElementById("status").innerText = "Verifying...";

    fetch("/api/verify?uid=" + uid)
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            document.getElementById("status").innerText = "✅ Verified";

            window.location.href = "https://t.me/YOUR_BOT?start=verify_done";

        } else {
            document.getElementById("status").innerText = "❌ " + data.message;
        }

    })
}
</script>

</body>
</html>
