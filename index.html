<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Payment</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* BALANCE CARD */
.balance-card{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
}

.balance{
  font-size:34px;
  font-weight:bold;
  margin-top:10px;
}

/* BUTTON GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.btn{
  background:#ffffff15;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
}

/* SECTION */
.section{
  padding:20px;
}

.card{
  background:#ffffff10;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1e293b;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.4s;
}

.popup.active{
  bottom:0;
}

.popup input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

.popup button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<div class="header">
💳 Universal Payment
</div>

<div class="balance-card">
  <div>Your Balance</div>
  <div class="balance">₹213.07</div>
</div>

<div class="grid">
  <div class="btn" onclick="openPopup('pay')">💸 Pay User</div>
  <div class="btn" onclick="openPopup('withdraw')">🏦 Withdraw</div>
  <div class="btn" onclick="openPopup('add')">➕ Add Fund</div>
  <div class="btn">📊 Top Withdrawals</div>
</div>

<div class="section">
  <h3>Top Withdrawals</h3>
  <div class="card">1️⃣ Rahul – ₹5,000</div>
  <div class="card">2️⃣ Aman – ₹4,200</div>
  <div class="card">3️⃣ Priya – ₹3,850</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3 id="popupTitle"></h3>
  <div id="popupContent"></div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function openPopup(type){
  let popup=document.getElementById("popup");
  let title=document.getElementById("popupTitle");
  let content=document.getElementById("popupContent");

  if(type==="pay"){
    title.innerHTML="Pay User";
    content.innerHTML=`
      <input type="text" placeholder="Enter User ID">
      <input type="number" placeholder="Enter Amount">
      <button onclick="closePopup()">Send Payment</button>
    `;
  }

  if(type==="withdraw"){
    title.innerHTML="Withdraw";
    content.innerHTML=`
      <input type="text" placeholder="Enter UPI ID">
      <input type="number" placeholder="Enter Amount">
      <button onclick="closePopup()">Request Withdraw</button>
    `;
  }

  if(type==="add"){
    title.innerHTML="Add Fund";
    content.innerHTML=`
      <input type="text" placeholder="Enter Wallet Number / UTR No">
      <input type="file">
      <button onclick="closePopup()">Submit Request</button>
    `;
  }

  popup.classList.add("active");
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
