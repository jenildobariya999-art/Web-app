<!DOCTYPE html>
<html>
<head>
  <title>Device Verification</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v3"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 120px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 85%;
      margin: auto;
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="status">🔐 Verifying your device...</h2>
</div>

<script>
const tg = window.Telegram.WebApp;

// ❌ Not Telegram
if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
  document.getElementById("status").innerText = "❌ Open inside Telegram";
  throw new Error("Not Telegram");
}

// ===== GET IP =====
async function getIP() {
  try {
    let res = await fetch("https://api.ipify.org?format=json");
    let data = await res.json();
    return data.ip;
  } catch {
    return "unknown";
  }
}

// ===== VERIFY =====
FingerprintJS.load().then(async fp => {

  const result = await fp.get();
  const fingerprint = result.visitorId;
  const ip = await getIP();
  const ua = navigator.userAgent;

  try {

    const res = await fetch("/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fingerprint: fingerprint,
        ip: ip,
        user_agent: ua
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      document.getElementById("status").innerText = "✅ Verified Successfully";
    }
    else if (data.status === "info") {
      document.getElementById("status").innerText = "✔️ Already Verified";
    }
    else {
      document.getElementById("status").innerText = "🚫 Verification Failed";
    }

  } catch {
    document.getElementById("status").innerText = "⚠️ Network Error";
  }

});
</script>

</body>
</html>
