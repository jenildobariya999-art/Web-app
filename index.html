<!DOCTYPE html>
<html>
<head>
  <title>Universal Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Login -->
  <div id="loginBox" class="card">
    <h2>Universal Payment</h2>
    <input type="text" id="username" placeholder="Username">
    <button onclick="login()">Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    
    <div class="card balanceCard">
      <h3>Balance</h3>
      <h1 id="balance">₹0</h1>
    </div>

    <div class="grid">
      <button onclick="showSend()">Pay</button>
      <button onclick="showWithdraw()">Withdraw</button>
      <button onclick="showDeposit()">Add Fund</button>
      <button onclick="showAdmin()">Admin</button>
    </div>

  </div>

  <!-- Send -->
  <div id="sendBox" class="card hidden">
    <h3>Pay To User</h3>
    <input type="text" id="payUser" placeholder="Receiver Username">
    <input type="number" id="payAmount" placeholder="Amount">
    <button onclick="payUser()">Send</button>
  </div>

  <!-- Withdraw -->
  <div id="withdrawBox" class="card hidden">
    <h3>Withdraw</h3>
    <input type="number" id="withdrawAmount" placeholder="Amount">
    <button onclick="withdraw()">Submit</button>
  </div>

  <!-- Add Fund -->
  <div id="depositBox" class="card hidden">
    <h3>Add Fund</h3>
    <input type="text" id="utr" placeholder="Enter UTR Number">
    <button onclick="deposit()">Submit</button>
  </div>

  <!-- Admin -->
  <div id="adminBox" class="card hidden">
    <h3>Admin Panel</h3>
    <input type="text" id="adminUser" placeholder="Username">
    <input type="number" id="adminAmount" placeholder="Amount to Add">
    <button onclick="addBalance()">Add Balance</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
