<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:#0f172a;
color:white;
padding:16px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:#334155;
}

/* WALLET CARD */

.wallet{
background:linear-gradient(135deg,#7c3aed,#2563eb);
padding:22px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
margin-bottom:20px;
}

.wallet h1{
font-size:32px;
margin-top:6px;
}

.add{
margin-top:12px;
background:white;
color:black;
border:none;
padding:10px 16px;
border-radius:12px;
}

/* ACTION GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:20px;
}

.action{
padding:18px;
border-radius:18px;
font-weight:600;
}

.a1{background:linear-gradient(135deg,#fb923c,#f97316);}
.a2{background:linear-gradient(135deg,#60a5fa,#2563eb);}
.a3{background:linear-gradient(135deg,#4ade80,#16a34a);}
.a4{background:linear-gradient(135deg,#a78bfa,#7c3aed);}

/* TRANSACTIONS */

.section{
margin-top:10px;
}

.tx{
background:#1e293b;
padding:14px;
border-radius:14px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

.credit{color:#22c55e;}
.debit{color:#ef4444;}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
<h2>Dashboard</h2>
<div class="avatar"></div>
</div>

<!-- WALLET -->

<div class="wallet">

<p>Total Balance</p>
<h1 id="balance">₹0.00</h1>

<button class="add">Add Money</button>

</div>

<!-- ACTIONS -->

<div class="grid">

<div class="action a1">🎁 Lifafa</div>
<div class="action a2" onclick="withdraw()">💸 Withdraw</div>
<div class="action a3" onclick="send()">👤 Pay User</div>
<div class="action a4">💳 UPI Pay</div>

</div>

<!-- TRANSACTIONS -->

<div class="section">

<h3>Recent Transactions</h3>

<div id="txList"></div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe.user

const API = "https://your-api.com"

async function loadBalance(){

const res = await fetch(API + "/balance/" + user.id)
const data = await res.json()

document.getElementById("balance").innerText =
"₹" + data.balance

}

async function loadTx(){

const res = await fetch(API + "/transactions/" + user.id)
const data = await res.json()

let html=""

data.slice(0,5).forEach(t=>{

const cls = t.sender == user.id ? "debit" : "credit"

html += `
<div class="tx">
<div>${t.amount}</div>
<div class="${cls}">${t.status}</div>
</div>
`

})

document.getElementById("txList").innerHTML = html

}

function send(){

const receiver = prompt("Receiver ID")
const amount = prompt("Amount")

fetch(API + "/send",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
sender:user.id,
receiver,
amount
})
})

}

function withdraw(){

alert("Withdraw system coming")

}

loadBalance()
loadTx()

</script>

</body>
</html>
