<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashy Wallet</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background: linear-gradient(180deg,#1e1f3a,#2b2d55);
  font-family: Arial;
  color:white;
  padding:20px;
}

.top-card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.balance{
  font-size:36px;
  font-weight:bold;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  opacity:0.8;
}

.quick-actions{
  display:flex;
  gap:12px;
  overflow-x:auto;
  margin-bottom:20px;
}

.action{
  min-width:100px;
  background:#ffffff10;
  padding:15px;
  border-radius:15px;
  text-align:center;
  font-size:14px;
}

.section{
  margin-top:20px;
}

.transactions{
  background:#ffffff10;
  padding:15px;
  border-radius:15px;
}

.tx{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.credit{color:#00ff9d;}
.debit{color:#ff4d6d;}

canvas{
  background:#ffffff10;
  border-radius:15px;
  padding:10px;
}
</style>
</head>

<body>

<div class="top-card">
  <div>Available Balance</div>
  <div class="balance">₹213.07</div>
  <div class="row">
    <div>This Month</div>
    <div style="color:#00ff9d;">+₹25.00</div>
  </div>
</div>

<div class="quick-actions">
  <div class="action">💸 Send</div>
  <div class="action">📥 Receive</div>
  <div class="action">🏦 Withdraw</div>
  <div class="action">🎁 Bonus</div>
</div>

<div class="section">
  <h3>Weekly Activity</h3>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h3>Recent Transactions</h3>
  <div class="transactions">
    <div class="tx">
      <div>Payment Sent</div>
      <div class="debit">-₹17.64</div>
    </div>
    <div class="tx">
      <div>Payment Received</div>
      <div class="credit">+₹25.00</div>
    </div>
    <div class="tx">
      <div>Bonus Added</div>
      <div class="credit">+₹10.00</div>
    </div>
  </div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [{
      label:"Credit",
      data:[20,0,50,30,70,10,15],
      borderColor:"#00ff9d",
      fill:false
    },{
      label:"Debit",
      data:[40,10,0,20,60,0,5],
      borderColor:"#ff4d6d",
      fill:false
    }]
  },
  options:{
    plugins:{legend:{labels:{color:"white"}}},
    scales:{
      x:{ticks:{color:"white"}},
      y:{ticks:{color:"white"}}
    }
  }
});
</script>

</body>
</html>
