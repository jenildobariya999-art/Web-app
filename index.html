<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}
.box {
  margin-top: 100px;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
}
button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: cyan;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Device Verification</h2>
  <p id="status">Checking...</p>
  <button onclick="verify()">Verify Now</button>
</div>

<script>
function getUid(){
  const url = new URL(window.location.href);
  return url.searchParams.get("uid");
}

async function verify(){
  let uid = getUid();

  let res = await fetch("/api/verify?uid=" + uid);
  let data = await res.json();

  document.getElementById("status").innerText = data.message;

  if(data.status === "success"){
      // Telegram redirect callback (simple)
      window.location.href = "https://t.me/YOUR_BOT_USERNAME";
  }
}
</script>

</body>
</html>
