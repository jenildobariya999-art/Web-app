<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Payment</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  color:white;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
}

.balance-card{
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  padding:25px;
  border-radius:20px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation: fadeIn 1s ease;
}

.balance-card h2{
  font-size:18px;
  opacity:0.8;
}

.balance{
  font-size:32px;
  margin-top:10px;
  font-weight:bold;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
}

.action-btn{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  padding:18px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.action-btn:hover{
  transform: translateY(-5px);
  background: rgba(255,255,255,0.2);
}

.section{
  margin-top:30px;
}

.section h3{
  margin-bottom:15px;
}

.list-item{
  background: rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  backdrop-filter: blur(10px);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn">☰</div>
  <h2>Universal Payment</h2>
  <div>👤</div>
</div>

<div class="balance-card">
  <h2>Available Balance</h2>
  <div class="balance">₹12,540</div>
</div>

<div class="actions">
  <div class="action-btn">💸<br>Send</div>
  <div class="action-btn">🏦<br>Withdraw</div>
  <div class="action-btn">➕<br>Add Fund</div>
</div>

<div class="section">
  <h3>Top Withdrawals</h3>
  <div class="list-item">Rahul — ₹15,000</div>
  <div class="list-item">Priya — ₹12,500</div>
  <div class="list-item">Amit — ₹10,800</div>
</div>

</body>
</html>
