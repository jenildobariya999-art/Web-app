<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Verification</title>
<style>
body { font-family: Arial; text-align:center; padding:50px; background:#f2f2f2; }
.card { background:#fff; padding:30px; border-radius:10px; display:inline-block; box-shadow:0 0 10px rgba(0,0,0,0.1);}
button { padding:10px 20px; font-size:16px; border:none; border-radius:5px; background:#28a745; color:#fff; cursor:pointer; }
pre { text-align:left; background:#eee; padding:10px; border-radius:5px; margin-top:20px; }
</style>
</head>
<body>
<div class="card">
<h2>🔐 Device Verification</h2>
<p>Click below to verify your device</p>
<button id="verifyBtn">✅ Verify</button>

<h3>🖥 Device Info:</h3>
<pre id="deviceInfo"></pre>
<div id="status"></div>
</div>

<script>
const fingerprint = `
User Agent: ${navigator.userAgent}
Platform: ${navigator.platform}
Vendor: ${navigator.vendor}
Language: ${navigator.language}
Screen: ${screen.width}x${screen.height}
Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
`;

document.getElementById('deviceInfo').innerText = fingerprint;

document.getElementById('verifyBtn').addEventListener('click', async () => {
  document.getElementById('status').innerText="⏳ Verifying...";

  try {
    const res = await fetch("https://web-app-one-sable.vercel.app/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fingerprint })
    });
    const data = await res.json();
    document.getElementById('status').innerText = data.message;
  } catch(e) {
    document.getElementById('status').innerText = "❌ Error contacting server";
    console.error(e);
  }
});
</script>
</body>
</html>
