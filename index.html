<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wallet</title>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
}

</style>

</head>
<body>

<div class="card">

<h3>Balance</h3>
<h1 id="bal">0</h1>

<button onclick="add()">Add Fund</button>
<button onclick="withdraw()">Withdraw</button>

</div>

<script>

let user = prompt("Enter Telegram ID")

async function load(){

let res = await fetch("http://localhost:3000/balance/"+user)
let data = await res.json()

document.getElementById("bal").innerText="₹"+data.balance

}

load()

async function add(){

let amount = prompt("Amount")
let utr = prompt("UTR")
let method = prompt("UPI / VSV / Saathi / Ultra")

await fetch("http://localhost:3000/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:user,amount,utr,method})
})

alert("Sent to admin")

}

async function withdraw(){

let amount = prompt("Amount")
let upi = prompt("UPI ID")

await fetch("http://localhost:3000/withdraw",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:user,amount,upi})
})

alert("Withdraw requested")

}

</script>

</body>
</html>
