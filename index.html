<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Universal Payment</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
  padding:20px;
}
.card{
  background:#203a43;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
</style>
</head>
<body>

<h2>💳 Universal Payment</h2>

<div class="card">
  Balance: ₹<span id="balance">0</span>
</div>

<div class="card">
  <h3>Pay User</h3>
  <input id="payId" placeholder="User ID">
  <input id="payAmount" type="number" placeholder="Amount">
  <button onclick="payUser()">Send</button>
</div>

<div class="card">
  <h3>Withdraw</h3>
  <input id="withdrawAmount" type="number" placeholder="Amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>Add Fund</h3>
  <input id="utr" placeholder="Enter UTR Number">
  <button onclick="addFund()">Submit Request</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const userId = tg.initDataUnsafe.user.id.toString();

// 🔥 Replace below
const SUPABASE_URL = "https://ksyymwybssakthxfuzdd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzeXltd3lic3Nha3RoeGZ1emRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTM0MzksImV4cCI6MjA4NzkyOTQzOX0.SCKV8iHLTf7Y5JAnXZgmyTvjdhi6LcDmKL6fW8ZnIeI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Create or Load User
async function loadUser(){
  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", userId);

  if(data.length === 0){
    await supabase.from("users").insert({
      id: userId,
      balance: 0,
      total_withdraw: 0
    });
    document.getElementById("balance").innerText = 0;
  } else {
    document.getElementById("balance").innerText = data[0].balance;
  }
}

loadUser();

// Pay User
async function payUser(){
  const toId = document.getElementById("payId").value;
  const amount = parseInt(document.getElementById("payAmount").value);

  let { data: sender } = await supabase
    .from("users")
    .select("*")
    .eq("id", userId);

  let { data: receiver } = await supabase
    .from("users")
    .select("*")
    .eq("id", toId);

  if(receiver.length === 0){
    alert("User not found");
    return;
  }

  if(sender[0].balance < amount){
    alert("Insufficient balance");
    return;
  }

  await supabase.from("users")
    .update({ balance: sender[0].balance - amount })
    .eq("id", userId);

  await supabase.from("users")
    .update({ balance: receiver[0].balance + amount })
    .eq("id", toId);

  loadUser();
  alert("Payment Sent");
}

// Withdraw
async function withdraw(){
  const amount = parseInt(document.getElementById("withdrawAmount").value);

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", userId);

  if(data[0].balance < amount){
    alert("Insufficient balance");
    return;
  }

  await supabase.from("users")
    .update({
      balance: data[0].balance - amount,
      total_withdraw: data[0].total_withdraw + amount
    })
    .eq("id", userId);

  loadUser();
  alert("Withdraw Requested");
}

// Add Fund
async function addFund(){
  const utr = document.getElementById("utr").value;

  await supabase.from("add_fund_requests").insert({
    user_id: userId,
    utr: utr,
    status: "pending"
  });

  alert("Request Submitted. Wait for admin approval.");
}
</script>

</body>
</html>
