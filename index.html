<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body{
background:#0a0a23;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:400px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.circle{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
border:4px solid #6c63ff;
animation:spin 2s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.success{border-color:#00ff9d;color:#00ff9d;}
.fail{border-color:red;color:red;}

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<div id="scan">
<div class="circle">🔄</div>
<h2>Scanning Device...</h2>
</div>

<div id="success" style="display:none">
<div class="circle success">✔</div>
<h2>Verified Successfully</h2>
<button onclick="goBot()">Continue</button>
</div>

<div id="fail" style="display:none">
<div class="circle fail">⚠</div>
<h2 id="failText">Failed</h2>
<button onclick="goBot()">Back</button>
</div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get("id");

const fp = navigator.userAgent + navigator.platform + screen.width + screen.height;

setTimeout(async ()=>{

try{

const res = await fetch("/verify", {
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({fp:fp,user:user})
});

const data = await res.json();

document.getElementById("scan").style.display="none";

if(data.status=="success"){
document.getElementById("success").style.display="block";
}else{
document.getElementById("fail").style.display="block";
document.getElementById("failText").innerText=data.message;
}

}catch{
document.getElementById("scan").style.display="none";
document.getElementById("fail").style.display="block";
}

},2000);

function goBot(){
window.location.href="https://t.me/YOUR_BOT";
}

</script>

</body>
</html>
